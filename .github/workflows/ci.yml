name: CI
on:
  push:
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install fastapi uvicorn sqlalchemy asyncpg pydantic pydantic-settings python-jose[cryptography] passlib[bcrypt] python-multipart redis httpx orjson paho-mqtt structlog prometheus-client tenacity
      - run: python -m compileall backend/app ai-service/app
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - working-directory: frontend
        run: npm install
