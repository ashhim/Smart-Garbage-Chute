[env:esp32-s3-poe]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -D MQTT_BUFFER_SIZE=2048
    -D CONFIG_MQTT_OUTBOX_DELAY=60000
    -D ARDUINO_LOOP_STACK_SIZE=8192

; Required libraries for sensor integration and MQTT
lib_deps = 
    https://github.com/expressif/esp-mqtt.git
    https://github.com/DaveGamble/cJSON.git

; Optional: OTA firmware update support
extra_scripts = 
    pre:scripts/check_updates.py

; Production settings
[env:production]
extends = esp32-s3-poe
build_flags = 
    ${env:esp32-s3-poe.build_flags}
    -D NDEBUG
    -Os

