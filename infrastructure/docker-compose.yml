services:
  postgres:
    image: postgres:16-alpine
    container_name: garbage-chute-db

    environment:
      POSTGRES_DB: garbage_chute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garbage_chute"]
      interval: 10s
      timeout: 5s
      retries: 10

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - garbage-chute-network

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: garbage-chute-cache

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    networks:
      - garbage-chute-network

    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: garbage-chute-mqtt

    ports:
      - "1883:1883"
      - "9001:9001"

    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - garbage-chute-network

    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile

    container_name: garbage-chute-backend

    env_file:
      - ../.env

    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/garbage_chute
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

    ports:
      - "8520:8000"

    volumes:
      - ../backend:/app

    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - garbage-chute-network

    restart: unless-stopped

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile

    container_name: garbage-chute-ai

    env_file:
      - ../.env

    environment:
      BACKEND_URL: http://backend:8000
      SIMULATION_MODE: "true"

    depends_on:
      backend:
        condition: service_started

    ports:
      - "8521:8001"

    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001"
      ]

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - garbage-chute-network

    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile

    container_name: garbage-chute-frontend

    env_file:
      - ../.env

    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/ws

    depends_on:
      backend:
        condition: service_started

    ports:
      - "3000:3000"

    networks:
      - garbage-chute-network

    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: garbage-chute-nginx

    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      ai-service:
        condition: service_started

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

    networks:
      - garbage-chute-network

    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: garbage-chute-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
      - prometheus_data:/prometheus

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

    networks:
      - garbage-chute-network

    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.3
    container_name: garbage-chute-grafana

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel

    depends_on:
      - prometheus

    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro

    networks:
      - garbage-chute-network

    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: garbage-chute-node-exporter

    ports:
      - "9100:9100"

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

    networks:
      - garbage-chute-network

    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: garbage-chute-alertmanager

    ports:
      - "9093:9093"

    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

    networks:
      - garbage-chute-network

    restart: unless-stopped

networks:
  garbage-chute-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
  prometheus_data:
  grafana_data:
  alertmanager_data: