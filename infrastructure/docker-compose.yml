services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: garbage_chute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garbage_chute"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports: ["6379:6379"]

  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]

  backend:
    build:
      context: ../backend
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    ports: ["8000:8000"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  ai-service:
    build:
      context: ../ai-service
    env_file: ../.env
    ports: ["8001:8001"]

  frontend:
    build:
      context: ../frontend
    env_file: ../.env
    depends_on:
      - backend
    ports: ["3000:3000"]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
      - ai-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["80:80"]

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.3
    ports: ["3001:3000"]

volumes:
  postgres_data:
