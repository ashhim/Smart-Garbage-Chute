global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: warning-alerts
      group_wait: 30s
      repeat_interval: 2h

receivers:
  - name: default
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'

  - name: critical-alerts
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'

  - name: warning-alerts
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']